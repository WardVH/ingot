name: CI

on: [push, pull_request]

# Least privilege: the suites only read the checked-out tree.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Elixir tests (${{ matrix.elixir }})
    runs-on: ubuntu-latest
    # Run inside the official Elixir image — the tag pins Elixir+OTP and is the *same*
    # image you can run locally, e.g.:
    #   docker run --rm -v "$PWD":/app -w /app elixir:1.18-otp-27 mix test
    container: elixir:${{ matrix.elixir }}
    strategy:
      fail-fast: false
      matrix:
        elixir:
          - "1.18-otp-27" # supported floor — built-in JSON module landed in Elixir 1.18
          - "1.19-otp-28" # matches local dev
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install hex + rebar
        run: mix local.hex --force && mix local.rebar --force

      - name: Check formatting
        run: mix format --check-formatted

      - name: Test (with coverage)
        run: mix test --cover

  api:
    name: API tests
    runs-on: ubuntu-latest
    container: elixir:1.18-otp-27
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      PGHOST: postgres
      PGPORT: "5432"
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install hex + rebar
        run: mix local.hex --force && mix local.rebar --force

      - name: Get deps
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Test
        run: mix test
